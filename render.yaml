# Render Blueprint — Infrastructure as Code
# https://render.com/docs/blueprint-spec

databases:
  - name: aicallingagent-db
    plan: starter  # $7/month — 1GB storage, 256MB RAM
    databaseName: aicallingagent
    user: aicallingagent_user
    region: oregon

services:
  - type: web
    name: aicallingagent
    runtime: python
    region: oregon
    plan: starter  # $7/month
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --ws-max-size 16777216 --timeout-keep-alive 120
    healthCheckPath: /api/health
    envVars:
      # Database — auto-linked from Render PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: aicallingagent-db
          property: connectionString

      # OpenAI
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard

      # Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: AGENT_PHONE_NUMBER
        sync: false

      # Application
      - key: BASE_URL
        value: https://apicoverlaunch.txogavideo.in
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: /tmp/app.log

      # Security — set manually
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

    pythonVersion: "3.13.3"
